name: spec-superflow
stages:
  - id: exploring
    type: brainstorm
    models: ["reviewer", "alt-reviewer"]
    synthesizer: reviewer
    output: brainstorm-report.md
  - id: specifying
    type: spec
    model: main-dev
  - id: bridging-review
    type: human_gate
    prompt: "Confirm spec.md captures a complete execution contract (scope, acceptance criteria, and constraints) before implementation begins. Reject to send this back for another planning pass."
  - id: tasks
    type: plan
    model: reviewer
  - id: executing
    type: ralph_loop
    model: main-dev
    per_story_fix_limit: 3
    gate:
      checks:
        - "npm run lint"
        - "npm run test"
      ai_review:
        enabled: true
        model: reviewer
        fail_on: ["blocker"]
        fail_threshold:
          major: 3
        strict: false
